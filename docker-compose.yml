# Docker Compose — Local Development
# Run both services: docker compose up --build

version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=DEBUG
    volumes:
      - ./backend:/app/backend  # Hot reload during development
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000  # Internal Docker network
    depends_on:
      - backend
    restart: unless-stopped
